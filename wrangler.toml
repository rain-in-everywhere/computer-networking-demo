# Cloudflare Workers 配置
# 项目：计算机网络课程大作业

name = "computer-networking-demo"
main = "src/index.js"
compatibility_date = "2026-06-28"
compatibility_flags = ["nodejs_compat"]

# Workers Assets：静态资源从 public/ 自动服务
[assets]
directory = "./public"
binding = "ASSETS"

# 环境变量
[vars]
SITE_NAME = "计网学习笔记"
SITE_AUTHOR = "Student"
